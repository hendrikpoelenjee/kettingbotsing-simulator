<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kettingbotsing Simulator v16</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#070c16;color:#d4dde8;font-family:'Courier New',monospace;font-size:12px;overflow-x:hidden}
    input[type=range]{-webkit-appearance:none;width:100%;background:transparent;cursor:pointer;height:16px}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:0;height:0}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#0c1525}
    ::-webkit-scrollbar-thumb{background:#1a3050;border-radius:2px}
    .tabs{display:flex;overflow-x:auto;white-space:nowrap;background:#0c1525;border-bottom:1px solid #1a3050}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:10px 14px;cursor:pointer;border:none;background:transparent;color:#5a7090;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.05em;border-bottom:2px solid transparent}
    .tab.active{color:#e8c547;border-bottom-color:#e8c547}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    @media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}
    .card{background:#0c1525;border-radius:6px;padding:14px;border:1px solid #1a3050}
    .card-title{font-size:9px;letter-spacing:.1em;margin-bottom:4px;font-weight:700}
    .card-sub{font-size:10px;color:#5a7090;margin-bottom:12px}
    .metric{background:#101e30;border-radius:6px;padding:10px;border-top:2px solid currentColor}
    .metric-label{font-size:9px;color:#5a7090;margin-bottom:4px;letter-spacing:.05em}
    .metric-val{font-size:19px;font-weight:700}
    .metric-sub{font-size:9px;color:#5a7090;margin-top:2px}
    .slider-row{margin-bottom:14px}
    .slider-top{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px}
    .slider-track{position:relative;height:4px;background:#1a3050;border-radius:2px}
    .slider-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px;transition:width .1s}
    .slider-range{position:absolute;top:-6px;left:0;width:100%;height:16px;opacity:0;cursor:pointer}
    .slider-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;border:2px solid #070c16;pointer-events:none;transition:left .1s}
    .toggle-group{display:flex;background:#1a3050;border-radius:4px;overflow:hidden;margin-top:4px}
    .toggle-btn{padding:4px 12px;font-size:10px;font-family:inherit;font-weight:700;border:none;cursor:pointer;transition:all .2s}
    .section-hdr{font-size:11px;font-weight:700;letter-spacing:.05em;padding-bottom:6px;border-bottom:1px solid #1a305055;margin-bottom:10px}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.04em;background:#101e30;border-bottom:1px solid #1a3050}
    td{padding:6px 10px;border-bottom:1px solid #1a305033}
    .tbl-wrap{overflow-x:auto}
    .note{font-size:9px;padding:5px 8px;border-radius:3px;margin:4px 0}
    .sep{border-top:1px dashed #1a3050;margin:10px 0}
    .bar-wrap{height:14px;background:#1a3050;border-radius:3px;overflow:hidden;margin-top:3px}
    .bar{height:100%;border-radius:3px;transition:width .3s}
    .liab-bar{display:flex;border-radius:6px;overflow:hidden;height:30px;margin:8px 0}
    .liab-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#070c16}
    p{margin:0 0 8px;color:#b0c4d8;line-height:1.7;font-size:11px}
    strong{font-weight:700}
  </style>
</head>
<body>
<div id="app"></div>
<script type="module">
// Kettingbotsing Simulator v16
// Kinetische Dynamica & Forensische Analyse

import { h, render } from 'https://unpkg.com/preact@10/dist/preact.module.js';
import { useState, useMemo } from 'https://unpkg.com/preact@10/hooks/dist/hooks.module.js';

// ─── Colors ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#070c16",panel:"#0c1525",card:"#101e30",border:"#1a3050",
  text:"#d4dde8",muted:"#5a7090",
  A:"#e8c547",B:"#5b9bd5",Bc:"#e07b54",
  green:"#4ade80",yellow:"#facc15",orange:"#fb923c",red:"#f87171",purple:"#a78bfa"
};

// ─── Physics ──────────────────────────────────────────────────────────────────
const toMs  = v => v/3.6;
const fmt   = (n,d=1) => Number(n).toFixed(d);
const fmtEur= n => "EUR " + Math.round(n).toLocaleString("nl-NL");
const fmtKJ = j => (j/1000).toFixed(2);

function calcCollision(m1,v1_kmh,m2,v2_kmh,e,dt){
  const v1=toMs(v1_kmh),v2=toMs(v2_kmh);
  const p1=((m1-e*m2)*v1+(1+e)*m2*v2)/(m1+m2);
  const p2=((m2-e*m1)*v2+(1+e)*m1*v1)/(m1+m2);
  const dv1=Math.abs(v1-p1),dv2=Math.abs(v2-p2);
  const KE0=0.5*m1*v1**2+0.5*m2*v2**2;
  const KE1=0.5*m1*p1**2+0.5*m2*p2**2;
  return{
    post1_kmh:p1*3.6,post2_kmh:p2*3.6,
    dv1_kmh:dv1*3.6,dv2_kmh:dv2*3.6,
    force_kN:(m1*dv1/dt)/1000,
    energy_kJ:(KE0-KE1)/1000,
    impulse_kNs:(m1*dv1)/1000
  };
}

function calcScenario(p){
  const vA1=p.vA_impact||0,vB1=p.vB_impact||12;
  const closingSpeed1=Math.max(0,vB1-vA1);
  const c1=calcCollision(p.mB,vB1,p.mA,vA1,p.e,p.dt);
  const vB2=p.bStill?0:Math.max(0,c1.post1_kmh);
  const mTarget=p.coupled?p.mA+p.mB:p.mB;
  const c2=calcCollision(p.mC,p.vC,mTarget,vB2,p.e,p.dt);
  const sandwichForce_kN=p.coupled?(p.mA*toMs(c2.dv2_kmh)/p.dt)/1000:0;
  const netCompression_kN=p.coupled?c2.force_kN+sandwichForce_kN:c2.force_kN;
  return{c1,c2,vB2,sandwichForce_kN,netCompression_kN,closingSpeed1,vA1,vB1};
}

const DEFAULTS={
  mA:1415,mB:1890,mC:2490,
  vApproach:15,vA_impact:2,vB_impact:12,vC:25,
  e:0.15,dt:0.12,bStill:true,coupled:true
};

const ETL_DEFAULTS={
  dagwaarde:28000,restwaardeNa:7500,
  repairFront:9500,repairFrontC:3000,repairRear:4200,merkantiel:1800,
  etlRatioPct:67
};

const ETL_NORMS=[
  {label:"Streng (50%)",   ratio:0.50,color:C.green, desc:"Consumentennorm"},
  {label:"Gebruikelijk (67%)",ratio:0.667,color:C.yellow,desc:"Meest gangbaar NL"},
  {label:"Ruim (75%)",     ratio:0.75, color:C.orange,desc:"WA+Casco polissen"},
  {label:"Volledig (100%)",ratio:1.00, color:C.red,   desc:"Technisch maximum"},
];

function severity(kN){
  if(kN<50)  return{label:"Licht",color:C.green};
  if(kN<120) return{label:"Matig",color:C.yellow};
  if(kN<220) return{label:"Zwaar",color:C.orange};
  return           {label:"Ernstig",color:C.red};
}

// ─── UI Components ────────────────────────────────────────────────────────────
function Slider({label,param,value,min,max,step,unit,color,onChange,prefix=""}){
  const pct=((value-min)/(max-min))*100;
  return h("div",{className:"slider-row"},
    h("div",{className:"slider-top"},
      h("span",{style:{color:C.muted}},label),
      h("span",{style:{fontWeight:700,color:color||C.text}},prefix+(value>=1000?value.toLocaleString("nl-NL"):value)+unit)
    ),
    h("div",{className:"slider-track"},
      h("div",{className:"slider-fill",style:{width:pct+"%",background:color||C.B}}),
      h("input",{type:"range",min,max,step,value,className:"slider-range",
        onInput:e=>onChange(param,Number(e.target.value))}),
      h("div",{className:"slider-thumb",style:{left:pct+"%",background:color||C.B}})
    ),
    h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginTop:3}},
      h("span",null,prefix+min+unit),h("span",null,prefix+max+unit)
    )
  );
}

function Toggle({label,value,onChange,trueLabel="Ja",falseLabel="Nee",color}){
  return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
    h("span",{style:{fontSize:10,color:C.muted}},label),
    h("div",{className:"toggle-group"},
      h("button",{className:"toggle-btn",
        style:{background:value?(color||C.B):"transparent",color:value?"#070c16":C.muted},
        onClick:()=>onChange(true)},trueLabel),
      h("button",{className:"toggle-btn",
        style:{background:!value?(color||C.B):"transparent",color:!value?"#070c16":C.muted},
        onClick:()=>onChange(false)},falseLabel)
    )
  );
}

function Card({title,sub,color,children}){
  return h("div",{className:"card",style:{borderTop:"2px solid "+color}},
    h("div",{className:"card-title",style:{color}},[title]),
    sub&&h("div",{className:"card-sub"},[sub]),
    children
  );
}

function Metric({label,value,unit,color,sub}){
  return h("div",{className:"metric",style:{color,borderTopColor:color}},
    h("div",{className:"metric-label"},[label]),
    h("div",{className:"metric-val"},[value,h("span",{style:{fontSize:11,marginLeft:3}},[unit])]),
    sub&&h("div",{className:"metric-sub"},[sub])
  );
}

function SectionHdr({label,sub,color}){
  return h("div",{className:"section-hdr",style:{color:color||C.text}},
    label,sub&&h("span",{style:{fontSize:10,color:C.muted,marginLeft:10}},[sub])
  );
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
const TABS=[
  {key:"params",  label:"Parameters"},
  {key:"results", label:"Resultaten"},
  {key:"etl",     label:"ETL Analyse"},
  {key:"legal",   label:"Juridisch"},
];

// ─── Parameter Tab ────────────────────────────────────────────────────────────
function ParamsTab({params,setParam}){
  return h("div",null,
    h("div",{className:"grid3",style:{marginBottom:14}},
      h(Card,{title:"VOERTUIG A . CAPTUR E-TECH",sub:"Massa rijklaar 1.415 kg . RDW",color:C.A},
        h(Slider,{label:"MASSA A",param:"mA",value:params.mA,min:900,max:2000,step:5,unit:" kg",color:C.A,onChange:setParam}),
        h("div",{style:{fontSize:10,color:C.muted,marginTop:4}},"Snelheid A: "+params.vA_impact+" km/h (rempoging noodstop)"),
        h(Slider,{label:"RESTSNELHEID A op impactmoment",param:"vA_impact",value:params.vA_impact,min:0,max:20,step:1,unit:" km/h",color:C.A,onChange:setParam}),
        h("div",{style:{fontSize:10,color:C.A+"99",marginTop:6}},"* Trekhaak -> puntbelasting x3-5")
      ),
      h(Card,{title:"VOERTUIG B . 5-SERIE TOURING",sub:"Massa rijklaar 1.890 kg . RDW",color:C.B},
        h(Slider,{label:"MASSA B",param:"mB",value:params.mB,min:1200,max:2500,step:5,unit:" kg",color:C.B,onChange:setParam}),
        h(Slider,{label:"SNELHEID B op impactmoment",param:"vB_impact",value:params.vB_impact,min:2,max:60,step:1,unit:" km/h",color:C.B,onChange:setParam}),
        h(Toggle,{label:"B STILSTAAND BIJ BOTSING 2",value:params.bStill,onChange:v=>setParam("bStill",v),color:C.B}),
        h(Toggle,{label:"B+A GEKOPPELD SYSTEEM",value:params.coupled,onChange:v=>setParam("coupled",v),color:C.B})
      ),
      h(Card,{title:"VOERTUIG C . X5 XDRIVE50E PHEV",sub:"Massa rijklaar 2.490 kg . RDW",color:C.Bc},
        h(Slider,{label:"MASSA C",param:"mC",value:params.mC,min:1500,max:3500,step:5,unit:" kg",color:C.Bc,onChange:setParam}),
        h(Slider,{label:"SNELHEID C (botsing 2)",param:"vC",value:params.vC,min:5,max:120,step:1,unit:" km/h",color:C.Bc,onChange:setParam})
      )
    ),
    h(Card,{title:"MODEL PARAMETERS",sub:"Botsingsmodel",color:C.purple},
      h("div",{className:"grid2"},
        h(Slider,{label:"RESTITUTIECOEFFICIENT (e)",param:"e",value:params.e,min:0,max:0.5,step:0.01,unit:"",color:C.purple,onChange:setParam}),
        h(Slider,{label:"CONTACTTIJD (dt)",param:"dt",value:params.dt,min:0.05,max:0.25,step:0.01,unit:" s",color:C.purple,onChange:setParam})
      ),
      h("div",{style:{fontSize:10,color:C.muted}},"e=0 (volledig plastisch) -> e=0.5 (semi-elastisch)")
    )
  );
}

// ─── Results Tab ─────────────────────────────────────────────────────────────
function ResultsTab({params,result}){
  const s1=severity(result.c1.force_kN);
  const s2=severity(result.netCompression_kN);
  return h("div",null,
    h("div",{style:{background:C.bg,border:"1px solid "+C.border,borderRadius:8,padding:"14px 12px 8px",marginBottom:12}},
      h("div",{style:{position:"relative",height:60}},
        h("div",{style:{position:"absolute",top:38,left:0,right:0,height:1,background:C.border}}),
        [
          {id:"A",x:72,col:C.A,v:params.vA_impact},
          {id:"B",x:50,col:C.B,v:params.vB_impact},
          {id:"C",x:22,col:C.Bc,v:params.vC}
        ].map(car=>h("div",{key:car.id,style:{position:"absolute",left:car.x+"%",top:18,transform:"translateX(-50%)",textAlign:"center"}},
          h("div",{style:{width:36,height:20,background:car.col+"22",border:"1.5px solid "+car.col,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:car.col}},car.id),
          h("div",{style:{fontSize:8,color:C.muted,marginTop:2}},car.v+" km/h")
        ))
      ),
      h("div",{style:{fontSize:9,color:C.muted,textAlign:"right"}},"-> rijrichting")
    ),

    h(SectionHdr,{label:"BOTSING 1",sub:"B ("+params.mB+" kg . "+params.vB_impact+" km/h) -> A ("+params.mA+" kg . "+params.vA_impact+" km/h) . sluitingssnelheid: "+result.closingSpeed1.toFixed(1)+" km/h",color:C.B}),
    h("div",{className:"grid3",style:{marginBottom:16}},
      h(Metric,{label:"Impactkracht",value:fmt(result.c1.force_kN),unit:"kN",color:s1.color,sub:s1.label}),
      h(Metric,{label:"Deformatie-energie",value:fmt(result.c1.energy_kJ),unit:"kJ",color:C.purple,sub:"Geabsorbeerd"}),
      h(Metric,{label:"Impuls",value:fmt(result.c1.impulse_kNs,2),unit:"kN.s",color:C.B,sub:"Krachtstoot"}),
      h(Metric,{label:"dV voertuig B",value:fmt(result.c1.dv1_kmh),unit:"km/h",color:C.B,sub:"Post: "+fmt(Math.max(0,result.c1.post1_kmh))+" km/h"}),
      h(Metric,{label:"dV voertuig A",value:fmt(result.c1.dv2_kmh),unit:"km/h",color:C.A,sub:"Post: "+fmt(Math.max(0,result.c1.post2_kmh))+" km/h"}),
      h(Metric,{label:"KE voor botsing B",value:fmt(0.5*params.mB*toMs(params.vB_impact)**2/1000),unit:"kJ",color:C.yellow,sub:"Kinetische energie B"})
    ),

    h(SectionHdr,{label:"BOTSING 2",sub:"C ("+params.mC+" kg . "+params.vC+" km/h) -> B"+(params.coupled?"+A":"")+" . "+fmt(result.vB2)+" km/h",color:C.Bc}),
    h("div",{className:"grid3",style:{marginBottom:10}},
      h(Metric,{label:"Impactkracht C->B",value:fmt(result.c2.force_kN),unit:"kN",color:s2.color,sub:s2.label}),
      h(Metric,{label:"Deformatie-energie",value:fmt(result.c2.energy_kJ),unit:"kJ",color:C.purple,sub:"Geabsorbeerd"}),
      h(Metric,{label:"Impuls",value:fmt(result.c2.impulse_kNs,2),unit:"kN.s",color:C.Bc,sub:"Krachtstoot"}),
      h(Metric,{label:"dV voertuig C",value:fmt(result.c2.dv1_kmh),unit:"km/h",color:C.Bc,sub:"Post: "+fmt(Math.max(0,result.c2.post1_kmh))+" km/h"}),
      h(Metric,{label:"dV voertuig B"+(params.coupled?"+A":""),value:fmt(result.c2.dv2_kmh),unit:"km/h",color:C.B,sub:"Post: "+fmt(Math.max(0,result.c2.post2_kmh))+" km/h"}),
      h(Metric,{label:"KE voor botsing C",value:fmt(0.5*params.mC*toMs(params.vC)**2/1000),unit:"kJ",color:C.yellow,sub:"Kinetische energie C"})
    ),
    params.coupled&&h("div",{style:{background:C.Bc+"11",border:"1px solid "+C.Bc+"33",borderRadius:6,padding:"10px 14px",fontSize:11,color:C.Bc}},
      "(!) SANDWICHEFFECT . Reactiekracht A->B: "+fmt(result.sandwichForce_kN)+" kN . Netto compressie B: "+fmt(result.netCompression_kN)+" kN . G-kracht B: "+fmt((toMs(result.c2.dv2_kmh)/params.dt)/9.81,1)+"g"
    )
  );
}

// ─── ETL Tab ─────────────────────────────────────────────────────────────────
function ETLTab({etl,setEtl}){
  const setE=(k,v)=>setEtl(p=>({...p,[k]:v}));
  const totalRepair=etl.repairFront+(etl.repairFrontC||0)+etl.repairRear+etl.merkantiel;
  const ratioVal=totalRepair/etl.dagwaarde;
  const thresh=etl.dagwaarde*(etl.etlRatioPct/100);
  const isETL=totalRepair>=thresh;

  const normRow=(norm)=>{
    const t=etl.dagwaarde*norm.ratio;
    const etlN=totalRepair>=t;
    const margin=totalRepair-t;
    return h("tr",{key:norm.label,style:{background:norm.color+"11"}},
      h("td",{style:{padding:"6px 10px",color:norm.color}},norm.label),
      h("td",{style:{padding:"6px 10px",color:C.muted}},fmt(norm.ratio*100,0)+"%"),
      h("td",{style:{padding:"6px 10px",color:C.text}},fmtEur(t)),
      h("td",{style:{padding:"6px 10px",color:etlN?C.red:C.green}},etlN?"(!) ETL":"[ok] OK"),
      h("td",{style:{padding:"6px 10px",color:margin>0?C.red:C.green}},(margin>0?"+":"")+fmtEur(margin))
    );
  };

  return h("div",null,
    h("div",{className:"grid2",style:{marginBottom:14}},
      h(Card,{title:"WAARDEBEPALING",sub:"BMW 5-serie Touring",color:C.B},
        h(Slider,{label:"DAGWAARDE (voor schade)",param:"dagwaarde",value:etl.dagwaarde,min:2000,max:80000,step:500,unit:"",prefix:"EUR ",color:C.green,onChange:setE}),
        h(Slider,{label:"RESTWAARDE (wrakwaarde)",param:"restwaardeNa",value:etl.restwaardeNa,min:500,max:30000,step:250,unit:"",prefix:"EUR ",color:C.yellow,onChange:setE}),
        h(Slider,{label:"ETL-DREMPEL %",param:"etlRatioPct",value:etl.etlRatioPct,min:40,max:100,step:1,unit:"%",color:C.orange,onChange:setE}),
        h("div",{style:{fontSize:10,color:C.muted,marginTop:4}},
          "Norm-drempel: "+fmtEur(thresh)+" . "+etl.etlRatioPct+"% van dagwaarde"
        )
      ),
      h(Card,{title:"REPARATIEKOSTEN PER OORZAAK",sub:"Per aansprakelijke partij",color:C.Bc},
        h(Slider,{label:"VOORZIJDE PRIMAIR (aansprakelijk: B)",param:"repairFront",value:etl.repairFront,min:0,max:30000,step:100,unit:"",prefix:"EUR ",color:C.B,onChange:setE}),
        h(Slider,{label:"VOORZIJDE DOORDRUK (aansprakelijk: C)",param:"repairFrontC",value:etl.repairFrontC||0,min:0,max:15000,step:100,unit:"",prefix:"EUR ",color:"#38bdf8",onChange:setE}),
        h(Slider,{label:"ACHTERZIJDE (aansprakelijk: C)",param:"repairRear",value:etl.repairRear,min:0,max:20000,step:100,unit:"",prefix:"EUR ",color:C.Bc,onChange:setE}),
        h(Slider,{label:"MERKANTIEL (aansprakelijk: C)",param:"merkantiel",value:etl.merkantiel,min:0,max:8000,step:100,unit:"",prefix:"EUR ",color:C.purple,onChange:setE})
      )
    ),
    h("div",{style:{background:C.panel,border:"1px solid "+C.border,borderRadius:6,padding:14,marginBottom:14}},
      h("div",{style:{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}},
        [
          ["Totaal herstel",fmtEur(totalRepair),C.text],
          ["% dagwaarde",fmt(ratioVal*100,1)+"%",isETL?C.red:C.green],
          ["Norm-drempel",fmtEur(thresh),C.orange],
          ["Marge",fmtEur(totalRepair-thresh),isETL?C.red:C.green],
        ].map(([l,v,col])=>h("div",{key:l,style:{flex:"1 1 120px",background:C.card,borderRadius:4,padding:"8px 10px",textAlign:"center"}},
          h("div",{style:{fontSize:9,color:C.muted,marginBottom:2}},l),
          h("div",{style:{fontSize:13,fontWeight:700,color:col}},v)
        ))
      ),
      h("div",{style:{background:C.card,borderRadius:6,overflow:"hidden"}},
        h("div",{className:"liab-bar"},
          h("div",{className:"liab-seg",style:{width:"7%",background:C.B,minWidth:40}},"7% B"),
          h("div",{className:"liab-seg",style:{flex:1,background:C.Bc}},"93% C")
        ),
        h("div",{style:{fontSize:10,color:C.muted,padding:"6px 10px"}},
          "Energie-additief model . Voorzijde B: 7% aansprakelijkheid B, 93% aansprakelijkheid C"
        )
      )
    ),
    h("div",{className:"tbl-wrap"},
      h("table",null,
        h("thead",null,h("tr",null,
          ["Norm","%","Drempel EUR","ETL?","Marge"].map(h2=>h("th",{key:h2},h2))
        )),

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [params, setParamsState] = useState({...DEFAULTS});
  const [etl, setEtl] = useState({...ETL_DEFAULTS});
  const [tab, setTab] = useState("params");

  const result = useMemo(()=>calcScenario(params),[params]);
  const setParam = (k,v) => setParamsState(p=>({...p,[k]:v}));

  return h("div",{style:{minHeight:"100vh",background:C.bg,color:C.text}},
    // Header
    h("div",{style:{background:"linear-gradient(135deg,#0c1525,#162040)",borderBottom:"1px solid "+C.border,padding:"14px 20px 10px"}},
      h("div",{style:{fontSize:9,color:C.B,letterSpacing:4,marginBottom:3}},"KINETISCHE DYNAMICA ANALYSE . INTERACTIEVE SIMULATOR"),
      h("div",{style:{fontSize:17,fontWeight:700,color:C.A}},"KOP-STAART KETTINGBOTSING"),
      h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},"A: Renault Captur E-Tech Hybrid . B: BMW 5-serie Touring . C: BMW X5 xDrive50e PHEV")
    ),
    // Tabs
    h("div",{className:"tabs"},
      TABS.map(t=>h("button",{key:t.key,className:"tab"+(tab===t.key?" active":""),onClick:()=>setTab(t.key)},t.label))
    ),
    // Content
    h("div",{style:{padding:"16px 20px",maxWidth:980,margin:"0 auto"}},
      tab==="params"  && h(ParamsTab,{params,setParam}),
      tab==="results" && h(ResultsTab,{params,result}),
      tab==="etl"     && h(ETLTab,{etl,setEtl}),
      tab==="legal"   && h(LegalTab,{result,params})
    )
  );
}

render(h(App,null), document.getElementById("app"));
</script>
